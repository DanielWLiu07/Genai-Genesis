version: "3.8"

services:
  web:
    build: ./apps/web
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000
    depends_on:
      - api

  api:
    build: ./services/api
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - AI_SERVICE_URL=http://ai:8001
      - RENDER_SERVICE_URL=http://render:8002
    depends_on:
      - ai
      - render

  ai:
    build: ./services/ai
    ports:
      - "8001:8001"
    env_file: .env

  render:
    build: ./services/render
    ports:
      - "8002:8002"
    env_file: .env
    volumes:
      - render_data:/app/renders

volumes:
  render_data:
